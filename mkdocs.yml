site_name: "pages"
plugins:
  search:
    lang: ja
  glightbox:
theme:
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.top
  font:
    text:
    code: Inconsolata
  icon:
    logo: fontawesome/solid/poo
  name: material
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
      primary: deep purple
    - scheme: default
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
      primary: deep purple
extra:
  generator: false
markdown_extensions:
  - admonition:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite:
  - pymdownx.snippets:
  - pymdownx.superfences:
